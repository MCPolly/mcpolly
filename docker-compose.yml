services:
  mcpolly:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - mcpolly-data:/data
    environment:
      - PORT=3000
      - DATABASE_URL=/data/mcpolly.db
      - RUST_LOG=mcpolly=info
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  mcpolly-data:
  ollama-data:
